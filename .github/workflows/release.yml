# Release packaging for mimi-hubd: raw binaries + a .deb per architecture attached to a GitHub
# Release, plus a multi-arch Docker image pushed to ghcr.io. Triggers on a `v*` tag push, or
# manually (workflow_dispatch) for a dry run against a draft release before relying on it for a
# real tag.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  package:
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu, aarch64-unknown-linux-gnu]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # Pinned by commit (the stable-channel branch tip, dtolnay/rust-toolchain has no semver
      # release tags) AND an explicit toolchain version - the repo/Dockerfile pin rustc 1.96.0
      # (rust-version in Cargo.toml); "stable" alone drifts to whatever's current at build time,
      # so a later rebuild of the same release tag could silently produce a different binary.
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable branch tip
        with:
          toolchain: "1.96.0"
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          key: ${{ matrix.target }}
      - name: install the aarch64 cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - name: build the release binary
        run: cargo build --release -p mimi-hubd --target ${{ matrix.target }}
      - name: package the raw binary
        run: |
          mkdir -p dist
          tar -C target/${{ matrix.target }}/release -czf dist/mimi-hubd-${{ matrix.target }}.tar.gz mimi-hubd
          # cd into dist/ before hashing so the .sha256 file records a BARE filename, not
          # "dist/mimi-hubd-...". Release assets upload flat (no dist/ prefix), so a checksum
          # recorded WITH that prefix fails `sha256sum -c` for anyone who downloads normally and
          # runs it from the same directory as the artifact.
          (cd dist && sha256sum mimi-hubd-${{ matrix.target }}.tar.gz > mimi-hubd-${{ matrix.target }}.tar.gz.sha256)
      - name: install cargo-deb
        run: cargo install cargo-deb --locked
      - name: build the .deb
        run: cargo deb -p mimi-hubd --target ${{ matrix.target }} -o dist/
      - name: checksum the .deb
        run: |
          cd dist
          for f in *.deb; do sha256sum "$f" > "$f.sha256"; done
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mimi-hubd-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@fe965f7af51af5f2602596916f38a38df2e33de0 # v3.0.2
        with:
          files: dist/*
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          generate_release_notes: true

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # QEMU emulation is what makes the arm64 leg of the multi-arch build below possible on this
      # (amd64) runner - without it, buildx silently falls back to building only the runner's own
      # native platform, so the "multi-arch" claim was never actually true.
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        id: meta
        with:
          images: ghcr.io/havenmessenger/mimi-hubd
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'workflow_dispatch' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
